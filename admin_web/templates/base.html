<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}So'rovnoma admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --bg-elevated: #121820;
      --surface: #161d27;
      --surface-hover: #1c2532;
      --border: rgba(255,255,255,0.08);
      --text: #f0f3f8;
      --muted: #8b98a8;
      --accent: #4d9fff;
      --accent-dim: rgba(77,159,255,0.15);
      --success: #34d399;
      --success-dim: rgba(52,211,153,0.12);
      --warning: #fbbf24;
      --danger: #f87171;
      --danger-dim: rgba(248,113,113,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.35);
      --font: "DM Sans", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-size: 0.88em; background: var(--bg-elevated); padding: 0.15em 0.4em; border-radius: 4px; }

    .login-wrap { max-width: 420px; margin: 0 auto; padding: 2rem 1.25rem; width: 100%; }

    .app-shell { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      padding: 1.25rem 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      padding: 0 1.25rem 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .sidebar-brand strong { display: block; font-size: 1.05rem; letter-spacing: -0.02em; }
    .sidebar-brand span { font-size: 0.78rem; color: var(--muted); }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 1.25rem;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.92rem;
      border-left: 3px solid transparent;
      text-decoration: none !important;
    }
    .nav-link:hover { background: var(--surface-hover); color: var(--text); }
    .nav-link.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }
    .sidebar-foot { margin-top: auto; padding: 1rem 1.25rem; font-size: 0.8rem; color: var(--muted); }

    .main { flex: 1; min-width: 0; padding: 1.5rem 1.75rem 2.5rem; max-width: 1400px; width: 100%; margin: 0 auto; }
    .page-head {
      display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .page-head h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; }
    .page-head p { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.92rem; max-width: 52ch; }
    .page-head .btn { flex-shrink: 0; align-self: flex-start; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
      max-width: 100%;
      overflow: hidden;
    }
    .card h2 { margin: 0 0 1rem; font-size: 1.05rem; font-weight: 600; color: var(--text); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 158px), 1fr));
      gap: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.15rem;
      position: relative;
      overflow: hidden;
    }
    .kpi::after {
      content: ""; position: absolute; top: 0; right: 0; width: 40%; height: 100%;
      background: linear-gradient(105deg, transparent, var(--accent-dim));
      pointer-events: none; opacity: 0.5;
    }
    .kpi .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .kpi .value { font-size: clamp(1.25rem, 4vw, 1.65rem); font-weight: 700; margin-top: 0.25rem; font-variant-numeric: tabular-nums; }
    .kpi .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; }

    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr)); gap: 1.25rem; margin-bottom: 1.5rem; }
    .chart-box { height: 260px; min-height: 200px; position: relative; width: 100%; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
      padding: 0.5rem 1rem; border-radius: var(--radius-sm); border: none;
      cursor: pointer; font-size: 0.9rem; font-weight: 600; font-family: inherit;
      text-decoration: none !important;
      touch-action: manipulation;
      min-height: 42px;
    }
    .btn-primary { background: var(--accent); color: #0a1628; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .btn-danger { background: var(--danger); color: #1a0505; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.82rem; }

    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; }
    input, select, textarea {
      width: 100%; max-width: 100%; padding: 0.6rem 0.75rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text); font-family: inherit;
      font-size: 16px;
    }
    .row { margin-bottom: 1rem; }

    .flash-ok { padding: 0.75rem 1rem; border-radius: var(--radius-sm); background: var(--success-dim); color: var(--success); margin-bottom: 1rem; font-size: 0.92rem; }
    .flash-err { padding: 0.75rem 1rem; border-radius: var(--radius-sm); background: var(--danger-dim); color: var(--danger); margin-bottom: 1rem; font-size: 0.92rem; }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      max-width: 100%;
      margin: 0 -0.25rem;
      padding: 0 0.25rem;
    }
    table.data { width: 100%; min-width: 520px; border-collapse: collapse; font-size: 0.88rem; }
    table.data th, table.data td { padding: 0.65rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.data th {
      background: var(--bg-elevated); color: var(--muted); font-weight: 600; font-size: 0.76rem;
      text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
    }
    table.data tbody tr:hover { background: var(--surface-hover); }
    table.data .num { text-align: right; font-variant-numeric: tabular-nums; }
    table.data .mono { font-family: ui-monospace, monospace; font-size: 0.84em; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .badge-ok { background: var(--success-dim); color: var(--success); }
    .badge-warn { background: rgba(251,191,36,0.15); color: var(--warning); }
    .badge-muted { background: var(--bg-elevated); color: var(--muted); }
    .badge-accent { background: var(--accent-dim); color: var(--accent); }

    .toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; margin-bottom: 1rem; }
    .toolbar .field { flex: 1 1 140px; min-width: 0; max-width: 220px; }
    .toolbar .field-grow { flex: 2 1 200px; min-width: 0; max-width: 360px; }

    .pagination { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 1rem; font-size: 0.88rem; color: var(--muted); }
    .pagination a { color: var(--accent); }

    .sort-link { color: inherit; text-decoration: none !important; white-space: nowrap; }
    .sort-link:hover { color: var(--accent); }

    .top-list { margin: 0; padding: 0; list-style: none; }
    .top-list li {
      display: grid; grid-template-columns: 2rem 1fr auto; gap: 0.75rem; align-items: center;
      padding: 0.65rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem;
    }
    .top-list li:last-child { border-bottom: none; }
    .top-rank { font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
    .top-votes { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

    .district-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); gap: 1rem; }
    .district-card {
      border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem;
      background: var(--bg-elevated); transition: border-color 0.15s, transform 0.15s;
    }
    .district-card:hover { border-color: rgba(77,159,255,0.35); transform: translateY(-1px); }
    .district-card h3 { margin: 0 0 0.35rem; font-size: 1rem; }
    .district-card .meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem; }

    .err { color: var(--danger); font-size: 0.88rem; margin-top: 0.5rem; }

    /* ——— Tablet ——— */
    @media (max-width: 900px) {
      html { font-size: 14px; }
      .main { padding: 1.15rem 1rem 2rem; }
      .app-shell { flex-direction: column; }
      .sidebar {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        align-items: start;
        padding: 0.85rem 1rem 1rem;
        gap: 0.65rem 0.75rem;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-brand {
        grid-column: 1;
        grid-row: 1;
        border: none;
        margin: 0;
        padding: 0 0.5rem 0 0;
        min-width: 0;
      }
      .sidebar-foot {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        margin: 0;
        padding: 0;
        align-self: center;
        justify-self: end;
      }
      .sidebar-foot .btn { width: auto; min-width: 6.5rem; min-height: 44px; }
      .sidebar nav {
        grid-column: 1 / -1;
        grid-row: 2;
        display: flex;
        flex-wrap: wrap;
        width: 100%;
        gap: 0.4rem;
      }
      .nav-link {
        border-left: none;
        border-radius: var(--radius-sm);
        padding: 0.55rem 0.85rem;
        min-height: 44px;
        flex: 1 1 auto;
        justify-content: center;
        text-align: center;
        font-size: 0.86rem;
      }
      .nav-link.active { border-left: none; box-shadow: inset 0 0 0 1px rgba(77,159,255,0.4); }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
      .chart-box { height: 240px; }
      .page-head h1 { font-size: 1.35rem; }
    }

    /* ——— Phone ——— */
    @media (max-width: 560px) {
      html { font-size: 14px; }
      .login-wrap { padding: 1.25rem 1rem 2rem; }
      .main { padding: 0.85rem 0.65rem 1.5rem; }
      .card { padding: 1rem 0.85rem; border-radius: 10px; }
      .page-head { flex-direction: column; align-items: stretch; gap: 0.75rem; margin-bottom: 1.1rem; }
      .page-head h1 { font-size: 1.2rem; }
      .page-head p { font-size: 0.88rem; max-width: none; }
      .page-head .btn { width: 100%; justify-content: center; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.6rem; }
      .kpi { padding: 0.75rem 0.8rem; }
      .kpi .label { font-size: 0.68rem; letter-spacing: 0.04em; }
      .kpi .value { font-size: clamp(1.1rem, 5.2vw, 1.4rem); }
      .kpi .hint { font-size: 0.7rem; }
      .chart-box { height: 220px; min-height: 180px; }
      .toolbar { flex-direction: column; align-items: stretch; gap: 0.65rem; }
      .toolbar .field,
      .toolbar .field-grow { max-width: none; width: 100%; flex: 1 1 auto; }
      .toolbar .field .btn { width: 100%; }
      table.data { font-size: 0.8rem; min-width: 480px; }
      table.data th, table.data td { padding: 0.5rem 0.45rem; }
      .pagination { flex-direction: column; align-items: flex-start; gap: 0.35rem; }
      .top-list li {
        grid-template-columns: 1.75rem 1fr minmax(2.5rem, auto);
        gap: 0.5rem 0.35rem;
        font-size: 0.85rem;
        align-items: start;
      }
      .top-list li > div:nth-child(2) { min-width: 0; word-break: break-word; }
      .district-grid { grid-template-columns: 1fr; }
      .sidebar nav { gap: 0.35rem; }
      .nav-link { flex: 1 1 calc(50% - 0.2rem); font-size: 0.8rem; padding: 0.5rem 0.5rem; }
      .sidebar { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
      .sidebar-brand { grid-column: 1; grid-row: 1; padding-right: 0; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
      .sidebar-foot { grid-column: 1; grid-row: 2; width: 100%; justify-self: stretch; margin-top: 0; }
      .sidebar-foot .btn { width: 100%; min-width: 0; min-height: 46px; }
      .sidebar nav { grid-column: 1; grid-row: 3; }
    }

    @media (max-width: 380px) {
      .nav-link { flex: 1 1 100%; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
