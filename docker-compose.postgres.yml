# Qo'llash: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
# .env da: DATABASE_URL=postgresql+asyncpg://sorovnomabot:PAROL@db:5432/sorovnomabot
services:
  bot:
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sorovnomabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sorovnomabot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sorovnomabot} -d ${POSTGRES_DB:-sorovnomabot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
